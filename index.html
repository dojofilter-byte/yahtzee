<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Yahtzee</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Hide default number input arrows for a cleaner mobile interface */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-2 sm:p-4 font-sans select-none">

    <main class="max-w-4xl mx-auto bg-slate-800 rounded-2xl shadow-xl overflow-hidden flex flex-col h-[calc(100vh-2rem)]">
        <!-- Sticky Header Controls -->
        <header class="bg-teal-600 p-4 flex flex-wrap gap-3 items-center justify-between shadow-md shrink-0">
            <h1 class="text-xl font-bold tracking-wide">☀️ BEACH YAHTZEE 🎲</h1>
            <div class="flex gap-2">
                <button onclick="addPlayer()" class="bg-slate-900 hover:bg-slate-950 font-bold px-3 py-1.5 rounded-lg text-sm transition">
                    + Add Player
                </button>
                <button onclick="resetGame()" class="bg-rose-700 hover:bg-rose-800 font-bold px-3 py-1.5 rounded-lg text-sm transition">
                    Reset Game
                </button>
            </div>
        </header>

        <!-- Main Scoreboard Area (Scrollable body, fixed columns) -->
        <div class="flex-1 overflow-auto">
            <table class="w-full border-collapse text-left relative">
                <!-- Table Sticky Headers (Player Names) -->
                <thead class="bg-slate-850 sticky top-0 z-20 shadow-sm">
                    <tr id="header-row">
                        <th class="p-3 text-xs font-bold text-teal-400 uppercase tracking-wider bg-slate-850 border-b border-slate-700 min-w-[120px] sticky left-0 z-30 shadow-[2px_0_5px_rgba(0,0,0,0.3)]">Category</th>
                        <!-- Dynamic player columns will inject here -->
                    </tr>
                </thead>
                
                <!-- Table Body -->
                <tbody id="scoreboard-body" class="divide-y divide-slate-700/50">
                    <!-- Categories will be dynamically injected here to ensure 100% matrix alignment -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // Define standard Yahtzee categories
        const categories = [
            { id: 'aces', name: 'Aces (1s)', section: 'upper' },
            { id: 'twos', name: 'Twos (2s)', section: 'upper' },
            { id: 'threes', name: 'Threes (3s)', section: 'upper' },
            { id: 'fours', name: 'Fours (4s)', section: 'upper' },
            { id: 'fives', name: 'Fives (5s)', section: 'upper' },
            { id: 'sixes', name: 'Sixes (6s)', section: 'upper' },
            { id: 'upper-sub', name: 'Upper Subtotal', section: 'meta', readOnly: true },
            { id: 'upper-bonus', name: 'Bonus (+35)', section: 'meta', readOnly: true },
            { id: 'three-kind', name: '3 of a Kind', section: 'lower' },
            { id: 'four-kind', name: '4 of a Kind', section: 'lower' },
            { id: 'full-house', name: 'Full House (25)', section: 'lower' },
            { id: 'sm-straight', name: 'Sm Straight (30)', section: 'lower' },
            { id: 'lg-straight', name: 'Lg Straight (40)', section: 'lower' },
            { id: 'yahtzee', name: 'YAHTZEE (50)', section: 'lower' },
            { id: 'chance', name: 'Chance', section: 'lower' },
            { id: 'grand-total', name: 'GRAND TOTAL', section: 'meta', readOnly: true, highlight: true }
        ];

        // State Structure: Array of player objects { id, name, scores: { categoryId: value } }
        let players = JSON.parse(localStorage.getItem('yahtzee_players')) || [
            { id: 1, name: 'Surfer Joe', scores: {} },
            { id: 2, name: 'Beach Bum', scores: {} }
        ];

        function saveState() {
            localStorage.setItem('yahtzee_players', JSON.stringify(players));
        }

        function renderGrid() {
            const headerRow = document.getElementById('header-row');
            const tbody = document.getElementById('scoreboard-body');

            // 1. Render Headers
            headerRow.innerHTML = `<th class="p-3 text-xs font-bold text-teal-400 uppercase tracking-wider bg-slate-850 border-b border-slate-700 min-w-[140px] sticky left-0 z-30 shadow-[2px_0_5px_rgba(0,0,0,0.2)]">Category</th>`;
            players.forEach((player, pIdx) => {
                headerRow.innerHTML += `
                    <th class="p-2 border-b border-slate-700 min-w-[100px] text-center bg-slate-850">
                        <input type="text" value="${player.name}" 
                            onchange="updatePlayerName(${pIdx}, this.value)"
                            class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 text-center font-bold text-slate-100 focus:border-teal-400 focus:outline-none text-sm">
                    </th>
                `;
            });

            // 2. Render Rows Matrix
            tbody.innerHTML = '';
            categories.forEach(cat => {
                let rowHtml = '';
                
                // Styling variants based on row type
                let rowBg = 'bg-slate-800/40';
                let labelStyle = 'font-medium text-slate-300';
                
                if (cat.section === 'meta') {
                    rowBg = 'bg-slate-900/60 font-semibold';
                    labelStyle = cat.highlight ? 'text-teal-400 font-black text-base' : 'text-slate-400 text-sm';
                }

                // Row category label (Sticky left column so names never disappear when swiping horizontally)
                rowHtml += `
                    <td class="p-3 border-b border-slate-700/50 sticky left-0 z-10 shadow-[2px_0_5px_rgba(0,0,0,0.15)] ${rowBg} ${labelStyle}">
                        ${cat.name}
                    </td>
                `;

                // Player Columns for this row
                players.forEach((player, pIdx) => {
                    if (cat.readOnly) {
                        // Calculated fields
                        const scoreValue = calculatePlayerMeta(player, cat.id);
                        let displayStyle = 'text-slate-300 font-bold';
                        if (cat.highlight) displayStyle = 'text-teal-300 font-black text-xl';
                        
                        rowHtml += `
                            <td class="p-2 border-b border-slate-700/50 text-center ${rowBg} ${displayStyle}">
                                ${scoreValue}
                            </td>
                        `;
                    } else {
                        // Editable Input fields
                        const val = player.scores[cat.id] !== undefined ? player.scores[cat.id] : '';
                        rowHtml += `
                            <td class="p-2 border-b border-slate-700/50 text-center ${rowBg}">
                                <input type="number" value="${val}"
                                    oninput="updateScore(${pIdx}, '${cat.id}', this.value)"
                                    class="w-16 bg-slate-900 border border-slate-600 rounded-lg p-2 text-center text-lg font-bold text-teal-300 focus:border-teal-500 focus:outline-none"
                                    min="0" max="50">
                            </td>
                        `;
                    }
                });

                tbody.innerHTML += `<tr class="hover:bg-slate-700/20">${rowHtml}</tr>`;
            });
        }

        function updatePlayerName(pIdx, newName) {
            players[pIdx].name = newName || `Player ${pIdx + 1}`;
            saveState();
        }

        function updateScore(pIdx, catId, value) {
            if (value === '') {
                delete players[pIdx].scores[catId];
            } else {
                players[pIdx].scores[catId] = parseInt(value) || 0;
            }
            saveState();
            
            // Recalculate readOnly blocks without blowing away input focus elements
            players.forEach((player, idx) => {
                categories.filter(c => c.readOnly).forEach(cat => {
                    // Update matrix totals statically via real-time render refresh
                });
            });
            renderGrid();
        }

        function calculatePlayerMeta(player, metaId) {
            let upperSum = 0;
            let lowerSum = 0;

            categories.forEach(cat => {
                if (cat.readOnly) return;
                const score = player.scores[cat.id] || 0;
                if (cat.section === 'upper') upperSum += score;
                if (cat.section === 'lower') lowerSum += score;
            });

            const bonus = upperSum >= 63 ? 35 : 0;

            if (metaId === 'upper-sub') return upperSum;
            if (metaId === 'upper-bonus') return bonus;
            if (metaId === 'grand-total') return upperSum + bonus + lowerSum;
            return 0;
        }

        function addPlayer() {
            const newId = players.length ? Math.max(...players.map(p => p.id)) + 1 : 1;
            players.push({
                id: newId,
                name: `Player ${newId}`,
                scores: {}
            });
            saveState();
            renderGrid();
        }

        function resetGame() {
            if (confirm('Are you sure you want to clear all scores? Player names will stay.')) {
                players.forEach(p => p.scores = {});
                saveState();
                renderGrid();
            }
        }

        // Run Initial Layout Build
        renderGrid();
    </script>
</body>
</html>
