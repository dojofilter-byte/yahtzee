<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Yahtzee</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-2 sm:p-4 font-sans select-none flex flex-col justify-between">

    <main class="max-w-4xl w-full mx-auto bg-slate-800 rounded-2xl shadow-xl overflow-hidden flex flex-col h-[calc(100vh-5.5rem)]">
        <header class="bg-teal-600 p-3 text-center shadow-md shrink-0">
            <h1 class="text-lg font-bold tracking-wide">☀️ BEACH YAHTZEE 🎲</h1>
        </header>

        <div class="flex-1 overflow-auto">
            <table class="w-full border-collapse text-left relative">
                <thead class="sticky top-0 z-20 shadow-sm">
                    <tr id="header-row" class="bg-slate-850">
                        <!-- Dynamic player headers inject here -->
                    </tr>
                </thead>
                <tbody id="scoreboard-body" class="divide-y divide-slate-700/40">
                    <!-- Dynamic categories inject here -->
                </tbody>
            </table>
        </div>

        <footer class="bg-slate-850 p-3 flex gap-3 border-t border-slate-700 shrink-0">
            <button onclick="addPlayer()" class="flex-1 bg-teal-600 hover:bg-teal-500 font-bold py-3 rounded-xl transition text-center shadow-md">
                + Add Player
            </button>
            <button onclick="resetGame()" class="flex-1 bg-rose-700 hover:bg-rose-600 font-bold py-3 rounded-xl transition text-center shadow-md">
                Reset Game
            </button>
        </footer>
    </main>

    <script>
        const diceSVGs = {
            1: '<svg style="width:1.25rem; height:1.25rem;" class="text-teal-400 inline mr-2" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2"/></svg>',
            2: '<svg style="width:1.25rem; height:1.25rem;" class="text-teal-400 inline mr-2" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="8" r="1.5"/><circle cx="16" cy="16" r="1.5"/></svg>',
            3: '<svg style="width:1.25rem; height:1.25rem;" class="text-teal-400 inline mr-2" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="7" cy="7" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="17" cy="17" r="1.5"/></svg>',
            4: '<svg style="width:1.25rem; height:1.25rem;" class="text-teal-400 inline mr-2" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="8" r="1.5"/><circle cx="16" cy="8" r="1.5"/><circle cx="8" cy="16" r="1.5"/><circle cx="16" cy="16" r="1.5"/></svg>',
            5: '<svg style="width:1.25rem; height:1.25rem;" class="text-teal-400 inline mr-2" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="7" cy="7" r="1.5"/><circle cx="17" cy="7" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="7" cy="16" r="1.5"/><circle cx="17" cy="16" r="1.5"/></svg>',
            6: '<svg style="width:1.25rem; height:1.25rem;" class="text-teal-400 inline mr-2" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="7" r="1.5"/><circle cx="16" cy="7" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="8" cy="17" r="1.5"/><circle cx="16" cy="17" r="1.5"/></svg>'
        };

        const categories = [
            { id: 'section-upper-hdr', name: 'UPPER SECTION', section: 'header' },
            { id: 'aces', name: 'Aces (1s)', section: 'upper', dice: 1 },
            { id: 'twos', name: 'Twos (2s)', section: 'upper', dice: 2 },
            { id: 'threes', name: 'Threes (3s)', section: 'upper', dice: 3 },
            { id: 'fours', name: 'Fours (4s)', section: 'upper', dice: 4 },
            { id: 'fives', name: 'Fives (5s)', section: 'upper', dice: 5 },
            { id: 'sixes', name: 'Sixes (6s)', section: 'upper', dice: 6 },
            { id: 'upper-sub', name: 'Upper Subtotal', section: 'upper-meta', readOnly: true },
            { id: 'upper-bonus', name: 'Bonus (Need 63+ for +35)', section: 'upper-meta', readOnly: true },
            { id: 'upper-total', name: 'Upper Section Total', section: 'upper-meta', readOnly: true, bold: true },
            { id: 'section-lower-hdr', name: 'LOWER SECTION', section: 'header' },
            { id: 'three-kind', name: '3 of a Kind', section: 'lower' },
            { id: 'four-kind', name: '4 of a Kind', section: 'lower' },
            { id: 'full-house', name: 'Full House (25)', section: 'lower' },
            { id: 'sm-straight', name: 'Sm Straight (30)', section: 'lower' },
            { id: 'lg-straight', name: 'Lg Straight (40)', section: 'lower' },
            { id: 'yahtzee', name: 'YAHTZEE (50)', section: 'lower' },
            { id: 'chance', name: 'Chance', section: 'lower' },
            { id: 'grand-total', name: 'GRAND TOTAL', section: 'meta', readOnly: true, highlight: true }
        ];

        let players = JSON.parse(localStorage.getItem('yahtzee_players')) || [
            { id: 1, name: 'Surfer Joe', scores: {} },
            { id: 2, name: 'Beach Bum', scores: {} }
        ];

        function saveState() {
            localStorage.setItem('yahtzee_players', JSON.stringify(players));
        }

        function renderGrid() {
            const headerRow = document.getElementById('header-row');
            const tbody = document.getElementById('scoreboard-body');

            let headerHtml = '<th class="p-3 text-xs font-bold text-slate-400 uppercase tracking-wider min-w-[155px] sticky left-0 z-30 bg-slate-850 shadow-[2px_0_5px_rgba(0,0,0,0.2)]">Category</th>';
            
            for (let i = 0; i < players.length; i++) {
                headerHtml += '<th class="p-2 border-b border-slate-700 min-w-[125px] text-center bg-slate-850 relative group">';
                headerHtml += '<div class="flex items-center gap-1 bg-slate-700 border border-slate-600 rounded px-1.5 py-1">';
                headerHtml += '<input type="text" value="' + players[i].name + '" onchange="updatePlayerName(' + i + ', this.value)" class="w-full bg-transparent text-center font-bold text-slate-100 focus:outline-none text-sm min-w-0">';
                headerHtml += '<button onclick="removePlayer(' + i + ')" class="text-rose-400 hover:text-rose-600 font-black text-xs px-1 rounded bg-slate-800/50" title="Delete Player">✕</button>';
                headerHtml += '</div></th>';
            }
            headerRow.innerHTML = headerHtml;

            tbody.innerHTML = '';
            
            for (let j = 0; j < categories.length; j++) {
                let cat = categories[j];
                
                if (cat.section === 'header') {
                    let totalCols = players.length + 1;
                    tbody.innerHTML += '<tr class="bg-slate-900 border-y border-slate-700"><td colspan="' + totalCols + '" class="p-2 pl-3 text-xs font-black tracking-widest text-teal-400 bg-slate-900/90 sticky left-0">' + cat.name + '</td></tr>';
                    continue;
                }

                let rowHtml = '';
                let rowBg = 'bg-slate-800/30';
                let labelStyle = 'font-medium text-slate-300 text-sm';
                
                if (cat.section.startsWith('upper')) {
                    rowBg = 'bg-slate-800/10';
                }
                if (cat.section === 'upper-meta') {
                    rowBg = 'bg-slate-850/70';
                    labelStyle = cat.bold ? 'text-teal-400 font-bold text-xs uppercase' : 'text-slate-400 text-xs italic';
                }
                if (cat.section === 'meta') {
                    rowBg = 'bg-slate-900/80';
                    labelStyle = 'text-teal-400 font-black text-base';
                }

                let diceIcon = cat.dice ? diceSVGs[cat.dice] : '';

                rowHtml += '<td class="p-2.5 border-b border-slate-700/40 sticky left-0 z-10 shadow-[2px_0_5px_rgba(0,0,0,0.15)] flex items-center ' + rowBg + ' ' + labelStyle + '">' + diceIcon + ' <span>' + cat.name + '</span></td>';

                for (let k = 0; k < players.length; k++) {
                    let player = players[k];
                    
                    if (cat.readOnly) {
                        let scoreValue = calculatePlayerMeta(player, cat.id);
                        let displayStyle = 'text-slate-300 font-semibold text-sm';
                        
                        if (cat.highlight) {
                            displayStyle = 'text-teal-300 font-black text-xl';
                        } else if (cat.bold) {
                            displayStyle = 'text-teal-400 font-bold text-sm';
                        }

                        rowHtml += '<td class="p-2 border-b border-slate-700/40 text-center ' + rowBg + ' ' + displayStyle + '">' + scoreValue + '</td>';
                    } else {
                        let val = player.scores[cat.id] !== undefined ? player.scores[cat.id] : '';
                        rowHtml += '<td class="p-2 border-b border-slate-700/40 text-center ' + rowBg + '"><input type="number" value="' + val + '" oninput="updateScore(' + k + ', \'' + cat.id + '\', this.value)" class="w-16 bg-slate-900 border border-slate-600 rounded-lg p-1.5 text-center text-lg font-bold text-teal-300 focus:border-teal-500 focus:outline-none" min="0" max="50"></td>';
                    }
                }

                tbody.innerHTML += '<tr class="hover:bg-slate-700/10">' + rowHtml + '</tr>';
            }
        }

        function updatePlayerName(pIdx, newName) {
            players[pIdx].name = newName.trim() || 'Player ' + (pIdx + 1);
            saveState();
        }

        function updateScore(pIdx, catId, value) {
            if (value === '') {
                delete players[pIdx].scores[catId];
            } else {
                players[pIdx].scores[catId] = parseInt(value) || 0;
            }
            saveState();
            renderGrid();
        }

        function calculatePlayerMeta(player, metaId) {
            let upperSum = 0;
            let lowerSum = 0;

            for (let i = 0; i < categories.length; i++) {
                let cat = categories[i];
                if (cat.readOnly || cat.section === 'header') continue;
                let score = player.scores[cat.id] || 0;
                if (cat.section === 'upper') upperSum += score;
                if (cat.section === 'lower') lowerSum += score;
            }

            let bonus = upperSum >= 63 ? 35 : 0;
            let upperTotal = upperSum + bonus;

            if (metaId === 'upper-sub') return upperSum;
            if (metaId === 'upper-bonus') return bonus;
            if (metaId === 'upper-total') return upperTotal;
            if (metaId === 'grand-total') return upperTotal + lowerSum;
            return 0;
        }

        function addPlayer() {
            let maxId = 0;
            for (let i = 0; i < players.length; i++) {
                if (players[i].id > maxId) maxId = players[i].id;
            }
            let newId = maxId + 1;
            players.push({
                id: newId,
                name: 'Player ' + newId,
                scores: {}
            });
            saveState();
            renderGrid();
        }

        function addPlayer() {
            let maxId = 0;
            for (let i = 0; i < players.length; i++) {
                if (players[i].id > maxId) maxId = players[i].id;
            }
            let newId = maxId + 1;
            players.push({
                id: newId,
                name: 'Player ' + newId,
                scores: {}
            });
            saveState();
            renderGrid();
        }

        function removePlayer(pIdx) {
            if (players.length <= 1) {
                alert("You need at least one player to keep score!");
                return;
            }
            let targetName = players[pIdx].name;
            if (confirm("Remove " + targetName + " from the game?")) {
                players.splice(pIdx, 1);
                saveState();
                renderGrid();
            }
        }

        function resetGame() {
            if (confirm('Are you sure you want to clear all scores? Player names will stay.')) {
                for (let i = 0; i < players.length; i++) {
                    players[i].scores = {};
                }
                saveState();
                renderGrid();
            }
        }

        renderGrid();
    </script>
</body>
</html>
